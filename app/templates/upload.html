<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузить инструмент</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin: 10px 0 5px;
        }
        input[type="text"],
        textarea,
        select,
        input[type="file"] {
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Загрузить новый инструмент</h1>
        <form action="{{ url_for('main.upload') }}" method="post" enctype="multipart/form-data">
            <label for="name">Название:</label>
            <input type="text" id="name" name="name" required>

            <label for="description">Описание:</label>
            <textarea id="description" name="description"></textarea>

            <label for="storage_location">Место хранения:</label>
            <select id="storage_location" name="storage_location" required>
                {% for location in storage_locations %}
                <option value="{{ location.id }}">{{ location.name }}</option>
                {% endfor %}
            </select>

            <label for="photo">Фото:</label>
            <input type="file" id="photo" name="photo">

            <input type="submit" value="Загрузить">
        </form>
        <a href="{{ url_for('main.index') }}">Вернуться к списку инструментов</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать места хранения</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .delete-button {
            background-color: #f44336;
            border: none;
            color: white;
            padding: 5px 10px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 14px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 4px;
        }
        .delete-button:hover {
            background-color: #e53935;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Редактировать места хранения</h1>
        <form action="{{ url_for('main.edit_storage_locations') }}" method="post">
            <label for="name">Добавить новое место хранения:</label>
            <input type="text" id="name" name="name" required>
            <input type="submit" value="Добавить">
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for location in storage_locations %}
                <tr>
                    <td>{{ location[0] }}</td>
                    <td>{{ location[1] }}</td>
                    <td>
                        <form action="{{ url_for('main.edit_storage_location2', location_id=location[0]) }}" method="post" style="display: inline;">
                            <input type="text" name="name" value="{{ location[1] }}" required>
                            <input type="submit" value="Сохранить">
                        </form>
                        <form action="{{ url_for('main.delete_storage_location', location_id=location[0]) }}" method="post" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите удалить это место хранения?');">
                            <input type="submit" value="Удалить" class="delete-button">
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('main.index') }}">Вернуться к списку инструментов</a>
    </div>
</body>
</html>

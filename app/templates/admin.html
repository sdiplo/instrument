<!DOCTYPE html>
<html>
<head>
    <title>Admin SQL Query Executor</title>
</head>
<body>
    <h1>SQL Query Executor</h1>
    <form method="post">
        <label for="report">Select Report:</label><br>
        <select id="report" name="report">
            <option value="">--Select a report--</option>
            {% for report in reports %}
                <option value="{{ report[0] }}" {% if request.form.get('report') == report[0]|safe %}selected{% endif %}>
                    {{ report[1] }}
                </option>
            {% endfor %}
        </select><br><br>

        <label for="query">SQL Query:</label><br>
        <textarea id="query" name="query" rows="10" cols="100">{{ request.form.get('query', '') }}</textarea><br>
        <input type="submit" value="Execute">
    </form>
    <h2>Result:</h2>
    {% if error_message %}
        <p style="color: red;">{{ error_message }}</p>
    {% elif columns and rows %}
        <table border="1">
            <thead>
                <tr>
                    {% for column in columns %}
                        <th>{{ column }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                    <tr>
                        {% for cell in row %}
                            <td>{{ cell }}</td>
                        {% endfor %}
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No results.</p>
    {% endif %}
</body>
</html>
